name: Bug Report
description: Report a bug or unexpected behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: input
    id: unity-version
    attributes:
      label: Unity version
      placeholder: e.g. 6000.4.1f1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x86_64
        - macOS x86_64
        - Android ARM64
        - Android x86_64
        - iOS ARM64
        - Editor only
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant error messages or logs.
      render: shell
    validations:
      required: false
