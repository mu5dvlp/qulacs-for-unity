name: Question
description: Ask a question about usage or behavior
title: "[question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: Feel free to ask anything about this package!
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context (code snippets, Unity version, platform, etc.)
    validations:
      required: false
