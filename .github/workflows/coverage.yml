name: API Coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  coverage:
    name: Qulacs wrapper coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -r tools/requirements.txt

      - name: Fetch Qulacs headers (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/qulacs/qulacs.git /tmp/qulacs
          cd /tmp/qulacs && git sparse-checkout set src/cppsim

      - name: Run coverage check
        run: |
          .venv/bin/python tools/check_coverage.py \
            --qulacs-src /tmp/qulacs/src/cppsim \
            --report coverage-report.txt \
            --badge-json coverage-badge.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage-report.txt

      - name: Read badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: badge
        run: |
          echo "message=$(jq -r .message coverage-badge.json)" >> "$GITHUB_OUTPUT"
          echo "color=$(jq -r .color coverage-badge.json)" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: qulacs-for-unity-coverage.json
          label: API coverage
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
